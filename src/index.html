<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <title>webgpu-samples: gameOfLife</title>
        <style>
            :root {
                color-scheme: light dark;
            }
            html,
            body {
                margin: 0; /* remove default margin */
                height: 100%; /* make body fill the browser window */
                display: flex;
                place-content: center center;
            }
            canvas {
                width: 600px;
                height: 600px;
                max-width: 100%;
                display: block;
            }
            #fpsDisplay {
                position: fixed;
                top: 10px;
                left: 10px;
                color: white;
                font-family: Arial, sans-serif;
            }
            #controls {
                position: fixed;
                bottom: 10px;
                left: 10px;
                color: white;
                font-family: Arial, sans-serif;
                background-color: rgba(0, 0, 0, 0.5);
                padding: 10px;
                border-radius: 5px;
            }
        </style>
        <script defer src="bundle.js" type="module"></script>
    </head>
    <body>
        <canvas id="__webgpu_particle_life_canvas__"></canvas>
        <div id="fpsDisplay">FPS: --</div>
        <div id="controls">
            <label for="driftSlider">Drift Speed:</label>
            <input
                type="range"
                id="driftSlider"
                min="-100"
                max="100"
                value="-20"
                step="1"
            />
            <span id="driftValue">-20</span> px/s
        </div>
    </body>
</html>
