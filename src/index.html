<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />
        <title>Origin of Life Simulation</title>
        <!-- JoyStick Library -->
        <script src="joy.js"></script>
    </head>
    <body>
        <div id="Dashboard">
            <div id="Zoom" class="vertical-slider-container">
                <label for="zoomSlider">Zoom:</label>
                <input
                    type="range"
                    id="zoomSlider"
                    min="1.50"
                    max="6.00"
                    value="2.00"
                    step="0.01"
                />
                <span id="zoomValue">2.00</span>
            </div>
            <div id="canvasContainer"></div>
            <div id="Joystick">
                <label>Navigation:</label>
                <div id="joyDiv"></div>
                <div id="zoomCenterInfo">
                    Center: (1200, 1200)
                    <br />
                    Range: 0
                </div>
            </div>
            <div id="fpsDisplay">FPS: --</div>
            <div id="Temp" class="vertical-slider-container">
                <label for="tempSlider">Temperature:</label>
                <input
                    type="range"
                    id="tempSlider"
                    min="3"
                    max="40"
                    value="20"
                    step="1"
                />
                <span id="tempValue">20°C</span>
            </div>

            <div id="Elec" class="vertical-slider-container">
                <label for="elecSlider">Electrical activity:</label>
                <input
                    type="range"
                    id="elecSlider"
                    min="0"
                    max="2"
                    value="0.68"
                    step="0.01"
                />
                <span id="elecValue">0.68</span>
            </div>

            <div id="UV" class="vertical-slider-container">
                <label for="uvSlider">UV light:</label>
                <input
                    type="range"
                    id="uvSlider"
                    min="0"
                    max="50"
                    value="25"
                    step="1"
                />
                <span id="uvValue">25</span>
            </div>

            <div id="Pres" class="vertical-slider-container">
                <label for="pressureSlider">Pressure:</label>
                <input
                    type="range"
                    id="presSlider"
                    min="0"
                    max="350"
                    value="1"
                    step="1"
                />
                <span id="presValue">1</span>
            </div>
        </div>

        <div id="controls">
            <div>
                <label for="driftSlider">Drift Speed:</label>
                <input
                    type="range"
                    id="driftSlider"
                    min="-80"
                    max="80"
                    value="-20"
                    step="1"
                />
                <span id="driftValue">-20</span> px/s
            </div>
            <div>
                <label for="forceScaleSlider">Force Scale:</label>
                <input
                    type="range"
                    id="forceScaleSlider"
                    min="100"
                    max="800"
                    value="400"
                    step="1"
                />
                <span id="forceScaleValue">400</span>
            </div>
            <div>
                <label for="frictionSlider">Friction:</label>
                <input
                    type="range"
                    id="frictionSlider"
                    min="0.01"
                    max="0.30"
                    value="0.10"
                    step="0.01"
                />
                <span id="frictionValue">0.10</span>
            </div>
            <div>
                <label for="rSmoothSlider">R Smooth:</label>
                <input
                    type="range"
                    id="rSmoothSlider"
                    min="0.1"
                    max="20"
                    value="5.0"
                    step="0.1"
                />
                <span id="rSmoothValue">5.0</span>
            </div>
            <div>
                <label for="interTypeAttractionScaleSlider"
                    >Inter-Type Attraction Scale:</label
                >
                <input
                    type="range"
                    id="interTypeAttractionScaleSlider"
                    min="-2.0"
                    max="2.0"
                    value="1.0"
                    step="0.1"
                />
                <span id="interTypeAttractionScaleValue">1.0</span>
            </div>
            <div>
                <label for="interTypeRadiusScaleSlider"
                    >Inter-Type Radius Scale:</label
                >
                <input
                    type="range"
                    id="interTypeRadiusScaleSlider"
                    min="0.1"
                    max="3.0"
                    value="1.0"
                    step="0.05"
                />
                <span id="interTypeRadiusScaleValue">1.0</span>
            </div>
            <div>
                <label for="fisheyeStrengthSlider">Fisheye Strength:</label>
                <input
                    type="range"
                    id="fisheyeStrengthSlider"
                    min="0.0"
                    max="3.0"
                    value="3.0"
                    step="0.1"
                />
                <span id="fisheyeStrengthValue">1.90</span>
            </div>

            <!-- Lenia Controls -->
            <div>
                <label for="leniaEnabledCheckbox">Enable Lenia:</label>
                <input type="checkbox" id="leniaEnabledCheckbox" />
                <span id="leniaEnabledStatus">Off</span>
            </div>
            <div>
                <label for="leniaGrowthMuSlider">Lenia Growth μ:</label>
                <input
                    type="range"
                    id="leniaGrowthMuSlider"
                    min="0.05"
                    max="0.3"
                    value="0.15"
                    step="0.01"
                />
                <span id="leniaGrowthMuValue">0.15</span>
            </div>
            <div>
                <label for="leniaGrowthSigmaSlider">Lenia Growth σ:</label>
                <input
                    type="range"
                    id="leniaGrowthSigmaSlider"
                    min="0.005"
                    max="0.05"
                    value="0.017"
                    step="0.001"
                />
                <span id="leniaGrowthSigmaValue">0.017</span>
            </div>
            <div>
                <label for="leniaKernelRadiusSlider"
                    >Lenia Kernel Radius:</label
                >
                <input
                    type="range"
                    id="leniaKernelRadiusSlider"
                    min="20.0"
                    max="100.0"
                    value="50.0"
                    step="5.0"
                />
                <span id="leniaKernelRadiusValue">50.0</span>
            </div>
        </div>
    </body>
</html>
